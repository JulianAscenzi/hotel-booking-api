name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hoteldb
          POSTGRES_USER: hotel
          POSTGRES_PASSWORD: hotelpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hotel -d hoteldb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run tests
        env:
          DB_URL: jdbc:postgresql://localhost:5432/hoteldb
          DB_USERNAME: hotel
          DB_PASSWORD: hotelpass
          JWT_SECRET: ci-secret-key-for-hotel-booking-api-that-is-long-enough
          REDIS_HOST: localhost
        run: mvn -B test
