services:
  postgres:
    image: postgres:16
    container_name: hotel-postgres
    environment:
      POSTGRES_DB: hoteldb
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hotelpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel -d hoteldb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hotel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hotel-booking-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: hotel
      DB_PASSWORD: ${DB_PASSWORD:-hotelpass}
      JWT_SECRET: ${JWT_SECRET:-docker-development-secret-key-for-hotel-booking-api-change-me}
      REDIS_HOST: redis
    ports:
      - "8080:8080"

volumes:
  postgres_data:
