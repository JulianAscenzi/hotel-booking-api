spring:
  application:
    name: hotel-booking-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hoteldb}
    username: ${DB_USERNAME:hotel}
    password: ${DB_PASSWORD:hotelpass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:local-development-secret-key-for-hotel-booking-api-please-change}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/hoteldb}
    username: ${DB_USERNAME:hotel}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
